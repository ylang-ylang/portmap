name: portmap

services:
  traefik:
    image: traefik:v3.6
    container_name: portmap-traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "${PORTMAP_HTTP_BIND:?run portmap gateway up}:${PORTMAP_HTTP_PORT:?run portmap gateway up}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - portmap_gateway

  catalog:
    image: python:3.12-alpine
    container_name: portmap-catalog
    command:
      - python
      - -m
      - portmap.catalog
    environment:
      PYTHONPATH: /workspace/src
      PORTMAP_CATALOG_LISTEN_HOST: 0.0.0.0
      PORTMAP_CATALOG_LISTEN_PORT: "8081"
      PORTMAP_HTTP_PORT: "${PORTMAP_HTTP_PORT:?run portmap gateway up}"
      PORTMAP_DNS_BIND: "${PORTMAP_DNS_BIND:?run portmap gateway up}"
      PORTMAP_DNS_DOMAIN: "${PORTMAP_DNS_DOMAIN:?run portmap gateway up}"
      PORTMAP_DNS_TARGET_IP: "${PORTMAP_DNS_TARGET_IP:?run portmap gateway up}"
      PORTMAP_STATE_DIR: "${PORTMAP_STATE_DIR:?run portmap gateway up}"
    ports:
      - "${PORTMAP_CATALOG_BIND:?run portmap gateway up}:${PORTMAP_CATALOG_PORT:?run portmap gateway up}:8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./src:/workspace/src:ro
      - "${PORTMAP_STATE_DIR:?run portmap gateway up}:${PORTMAP_STATE_DIR:?run portmap gateway up}"
    networks:
      - portmap_gateway

  dns:
    image: coredns/coredns:1.12.1
    container_name: portmap-dns
    command:
      - "-conf"
      - "/etc/coredns/Corefile"
    environment:
      PORTMAP_DNS_DOMAIN: "${PORTMAP_DNS_DOMAIN:?run portmap gateway up}"
      PORTMAP_DNS_TARGET_IP: "${PORTMAP_DNS_TARGET_IP:?run portmap gateway up}"
      PORTMAP_DNS_FORWARD: "${PORTMAP_DNS_FORWARD:-/etc/resolv.conf}"
    ports:
      - "${PORTMAP_DNS_BIND:?run portmap gateway up}:${PORTMAP_DNS_PORT:?run portmap gateway up}:53/udp"
      - "${PORTMAP_DNS_BIND:?run portmap gateway up}:${PORTMAP_DNS_PORT:?run portmap gateway up}:53/tcp"
    volumes:
      - ./gateway/Corefile:/etc/coredns/Corefile:ro
    networks:
      - portmap_gateway

networks:
  portmap_gateway:
    name: "${PORTMAP_GATEWAY_NETWORK:?run portmap gateway up}"
